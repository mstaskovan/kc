<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krížová cesta 2026 Rajecké Teplice</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: #f4f4f4; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px;
            min-height: 100vh;
        }

        .main-title {
            text-align: center;
            color: #2c3e50;
            margin: 20px 0;
            font-size: 1.6rem;
            line-height: 1.2;
        }

        .slider-wrapper {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .slider-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            background: white;
        }

        .slides {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            align-items: center;
        }

        .slides img {
            width: 100%;
            height: auto;
            flex-shrink: 0;
            display: block;
        }

        .navigation-bar {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 900px;
        }

        .nav-btn {
            background: #4a4a4a;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            flex: 1;
            max-width: 120px;
            transition: 0.2s;
        }

        .nav-btn:hover { background: #222; }

        .controls-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex: 2;
        }

        select {
            width: 100%;
            max-width: 200px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .counter {
            font-size: 14px;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .main-title { font-size: 1.3rem; }
            .nav-btn { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<h1 class="main-title">Krížová cesta 2026<br>Rajecké Teplice</h1>

<div class="slider-wrapper">
    <div class="slider-container">
        <div class="slides" id="slides"></div>
    </div>
</div>

<div class="navigation-bar">
    <a href="texty.html" class="nav-btn toggle-btn">Zobraziť texty piesní</a>
    <button class="nav-btn" onclick="moveSlide(-1)">&#10094; Späť</button>
    
    <div class="controls-center">
        <div class="counter" id="counter">Úvod</div>
        <select id="pageSelect" onchange="goToSlide(this.value)"></select>
    </div>

    <button class="nav-btn" onclick="moveSlide(1)">Ďalej &#10095;</button>
</div>

<script>
    const totalImages = 16;
    const slidesContainer = document.getElementById('slides');
    const select = document.getElementById('pageSelect');
    const counter = document.getElementById('counter');
    let currentIndex = 0;

    // Funkcia na určenie názvu strany
    function getSlideName(index) {
        if (index === 1) return "Úvod";
        if (index === 16) return "Záver";
        return `Zastavenie ${index - 1}`;
    }

    // Generovanie slidera
    for (let i = 1; i <= totalImages; i++) {
        let fileName = i < 10 ? `0${i}` : i;
        let slideName = getSlideName(i);

        // Pridanie obrázka
        let img = document.createElement('img');
        img.src = `img/${fileName}.jpg`;
        img.alt = slideName;
        slidesContainer.appendChild(img);

        // Pridanie do výberu
        let option = document.createElement('option');
        option.value = i - 1;
        option.text = slideName;
        select.appendChild(option);
    }

    function updateSlider() {
        slidesContainer.style.transform = `translateX(${-currentIndex * 100}%)`;
        select.value = currentIndex;
        counter.innerText = getSlideName(currentIndex + 1);
        
        // Pri prepnutí vyskočiť na vrch (dobré pre mobily)
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function moveSlide(direction) {
        currentIndex += direction;
        if (currentIndex >= totalImages) currentIndex = 0;
        if (currentIndex < 0) currentIndex = totalImages - 1;
        updateSlider();
    }

    function goToSlide(index) {
        currentIndex = parseInt(index);
        updateSlider();
    }

    // Ovládanie klávesnicou
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") moveSlide(-1);
        if (e.key === "ArrowRight") moveSlide(1);
    });
</script>

</body>
</html>
