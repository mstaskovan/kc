<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krížová cesta 2026, Rajecké Teplice</title>
    <link rel="icon" href="img/icon.jpg" type="img/jpg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        
        html, body {
            background-color: #f4f4f4;
            min-height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: 10px; }

        body.modal-open { overflow: hidden !important; height: 100vh; }

        .main-title {
            text-align: center; color: #2c3e50; margin: 20px 0 10px 0;
            font-size: 1.6rem; line-height: 1.2; font-weight: bold;
        }

        .top-nav { margin-bottom: 15px; width: 100%; max-width: 900px; display: flex; justify-content: center; gap: 10px; }
        .mode-btn { 
            background: #ccc; color: #333; border: none; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.3s;
        }
        .mode-btn.active { color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #btn-noty.active { background: #8e44ad; }
        #btn-texty.active { background: #27ae60; }

        #zoom-controls { margin-bottom: 15px; display: none; gap: 10px; }
        #zoom-controls.visible { display: flex; }
        .zoom-btn { background: #ddd; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .slider-wrapper { 
            width: 100%; max-width: 900px; background: white; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 5px; overflow: hidden;
        }

        #noty-section { position: relative; overflow: hidden; width: 100%; }
        .slides { display: flex; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); align-items: center; }
        .slides img { 
            width: 100%; height: auto; max-height: 70vh; 
            object-fit: contain; flex-shrink: 0; display: block; cursor: zoom-in; 
        }

        #texty-section { width: 100%; min-height: 200px; padding: 25px; display: none; align-items: center; justify-content: center; }
        .text-display { width: 100%; text-align: center; font-size: 1.3rem; line-height: 1.5; white-space: pre-line; color: #333; }

        /* OPRAVENÝ LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            overflow: hidden;
            touch-action: none;
        }

        #lightbox-img {
            position: absolute;
            top: 50%;
            left: 50%;
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            user-select: none;
            will-change: transform;
            cursor: grab;
            /* Dôležité: výchzia transformácia pre centrovanie */
            transform: translate(-50%, -50%) scale(1);
        }

        #close-lightbox {
            position: fixed; top: 20px; right: 30px;
            color: white; font-size: 50px; font-weight: bold;
            z-index: 2001; cursor: pointer; user-select: none;
        }

        .navigation-bar { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 900px; }
        .nav-controls { display: flex; justify-content: space-between; width: 100%; gap: 10px; }
        .nav-btn { background: #4a4a4a; color: white; border: none; padding: 12px; font-size: 1rem; cursor: pointer; border-radius: 8px; flex: 1; }
        
        .controls-center { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }
        select { width: 100%; max-width: 250px; padding: 12px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc; background: white; }
        .counter { font-size: 0.85rem; color: #666; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 480px) {
            #close-lightbox { top: 10px; right: 20px; font-size: 40px; }
            .slides img { max-height: none; }
        }
    </style>
</head>
<body>

<h1 class="main-title">Krížová cesta 2026<br>Rajecké Teplice</h1>

<div class="top-nav">
    <button id="btn-noty" class="mode-btn active" onclick="setMode('noty')">NOTY</button>
    <button id="btn-texty" class="mode-btn" onclick="setMode('texty')">TEXTY</button>
</div>

<div id="zoom-controls">
    <button class="zoom-btn" onclick="changeZoom(-2)">A-</button>
    <button class="zoom-btn" onclick="resetZoom()">Pôvodná veľkosť</button>
    <button class="zoom-btn" onclick="changeZoom(2)">A+</button>
</div>

<div class="slider-wrapper">
    <div id="noty-section">
        <div class="slides" id="slides-img"></div>
    </div>
    <div id="texty-section">
        <div id="text-display" class="text-display"></div>
    </div>
</div>

<div class="navigation-bar">
    <div class="nav-controls">
        <button class="nav-btn" onclick="moveSlide(-1)">&#10094; Späť</button>
        <button class="nav-btn" onclick="moveSlide(1)">Ďalej &#10095;</button>
    </div>
    <div class="controls-center">
        <div class="counter" id="counter">Úvod</div>
        <select id="pageSelect" onchange="goToSlide(this.value)"></select>
    </div>
</div>

<div id="lightbox">
    <span id="close-lightbox" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" alt="Noty">
</div>

<script>
    const totalSlides = 16;
    let currentIndex = 0;
    let currentMode = 'noty';
    let currentFontSize = 22;

    const texts = [
        "Úvodná pieseň:\nAdoramus te Christe benedicimus tibi, quia per crucem tuam redemisti mundum...",
        "1. zastavenie:\nJežiš je odsúdený na smrť.",
        "2. zastavenie:\nJežiš berie kríž na svoje plecia.",
        "3. zastavenie:\nJežiš padá prvý raz pod krížom.",
        "4. zastavenie:\nJežiš sa stretá so svojou Matkou.",
        "5. zastavenie:\nŠimon Cyrenajský pomáha Ježišovi niesť kríž.",
        "6. zastavenie:\nVeronika podáva Ježišovi šatku.",
        "7. zastavenie:\nJežiš padá druhý raz pod krížom.",
        "8. zastavenie:\nJežiš napomína plačúce ženy.",
        "9. zastavenie:\nJežiš padá tretí raz pod krížom.",
        "10. zastavenie:\nJežišovi vyzliekajú šaty.",
        "11. zastavenie:\nJežiša pribíjajú na kríž.",
        "12. zastavenie:\nJežiš na kríži zomiera.",
        "13. zastavenie:\nJežiša snímajú z kríža.",
        "14. zastavenie:\nJežiša pochovávajú.",
        "Záverečná pieseň:\nKristus víťaz, Kristus kráľ!"
    ];

    function getSlideName(index) {
        if (index === 0) return "Úvod";
        if (index === 15) return "Záver";
        return `Zastavenie ${index}`;
    }

    const slidesImgContainer = document.getElementById('slides-img');
    const select = document.getElementById('pageSelect');

    for (let i = 0; i < totalSlides; i++) {
        let fileName = (i + 1) < 10 ? `0${i + 1}` : (i + 1);
        let img = document.createElement('img');
        img.src = `img/${fileName}.jpg`;
        img.onclick = function() { openLightbox(this.src); };
        slidesImgContainer.appendChild(img);

        let option = document.createElement('option');
        option.value = i;
        option.text = getSlideName(i);
        select.appendChild(option);
    }

    // --- LOGIKA LIGHTBOXU (PC ZOOM + DRAG) ---
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    let scale = 1, offsetX = 0, offsetY = 0, isDragging = false, startX, startY;

    function openLightbox(src) {
        scale = 1; offsetX = 0; offsetY = 0;
        lbImg.src = src;
        lb.style.display = 'block';
        document.body.classList.add('modal-open');
        updateTransform();
        document.getElementById('viewport').content = "width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes";
    }

    function closeLightbox() {
        lb.style.display = 'none';
        document.body.classList.remove('modal-open');
        const vp = document.getElementById('viewport');
        vp.content = "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no";
        setTimeout(() => { vp.content = "width=device-width, initial-scale=1.0"; }, 300);
    }

    function updateTransform() {
        // translate(-50%, -50%) zabezpečí centrovanie, offsetX/Y pridáva posun
        lbImg.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) scale(${scale})`;
    }

    lb.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.85 : 1.15;
        scale = Math.min(Math.max(1, scale * delta), 6);
        if (scale === 1) { offsetX = 0; offsetY = 0; }
        updateTransform();
    }, { passive: false });

    lbImg.addEventListener('mousedown', (e) => {
        if (scale > 1) {
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
            lbImg.style.cursor = 'grabbing';
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        offsetX = e.clientX - startX;
        offsetY = e.clientY - startY;
        updateTransform();
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        lbImg.style.cursor = 'grab';
    });

    // Zatvorenie kliknutím na pozadie
    lb.addEventListener('click', (e) => {
        if (e.target === lb) closeLightbox();
    });

    // --- NAVIGÁCIA A OSTATNÉ ---
    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-noty').classList.toggle('active', mode === 'noty');
        document.getElementById('btn-texty').classList.toggle('active', mode === 'texty');
        document.getElementById('noty-section').style.display = mode === 'noty' ? 'block' : 'none';
        document.getElementById('texty-section').style.display = mode === 'texty' ? 'flex' : 'none';
        document.getElementById('zoom-controls').classList.toggle('visible', mode === 'texty');
        updateDisplay();
    }

    function updateDisplay() {
        slidesImgContainer.style.transform = `translateX(${-currentIndex * 100}%)`;
        document.getElementById('text-display').innerText = texts[currentIndex];
        select.value = currentIndex;
        document.getElementById('counter').innerText = getSlideName(currentIndex);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function moveSlide(direction) {
        currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
        updateDisplay();
    }

    function goToSlide(index) {
        currentIndex = parseInt(index);
        updateDisplay();
    }

    function changeZoom(amount) {
        currentFontSize += amount;
        document.getElementById('text-display').style.fontSize = currentFontSize + "px";
    }
    function resetZoom() {
        currentFontSize = 22;
        document.getElementById('text-display').style.fontSize = currentFontSize + "px";
    }

    updateDisplay();
</script>
</body>
</html>
