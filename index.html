<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krížová cesta 2026 Rajecké Teplice</title>
    <style>
        /* Základné nastavenia */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: #f9f9f9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            min-height: 100vh;
        }

        .main-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        /* Kontajner slidera */
        .slider-wrapper {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .slider-container {
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .slides {
            display: flex;
            transition: transform 0.4s ease-out;
            align-items: center; /* Vycentruje obrázky vertikálne ak sú rôzne vysoké */
        }

        .slides img {
            width: 100%;
            height: auto;
            flex-shrink: 0;
            display: block;
            background: white;
        }

        /* Spodná navigácia */
        .navigation-bar {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-btn:hover { background: #34495e; }
        .nav-btn:active { transform: scale(0.98); }

        .controls-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        select {
            padding: 8px 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
            cursor: pointer;
        }

        .counter {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: bold;
        }

        /* Responzivita pre mobil */
        @media (max-width: 600px) {
            .main-title { font-size: 1.4rem; }
            .nav-btn { padding: 10px 20px; width: 45%; justify-content: center; }
            .navigation-bar { gap: 10px; }
            .controls-center { order: -1; width: 100%; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

<h1 class="main-title">Krížová cesta 2026 Rajecké Teplice</h1>

<div class="slider-wrapper">
    <div class="slider-container">
        <div class="slides" id="slides">
            </div>
    </div>
</div>

<div class="navigation-bar">
    <button class="nav-btn" onclick="moveSlide(-1)">&#10094; Späť</button>
    
    <div class="controls-center">
        <div class="counter" id="counter">Zastavenie 1 / 20</div>
        <select id="pageSelect" onchange="goToSlide(this.value)"></select>
    </div>

    <button class="nav-btn" onclick="moveSlide(1)">Ďalej &#10095;</button>
</div>

<script>
    const totalImages = 20;
    const slidesContainer = document.getElementById('slides');
    const select = document.getElementById('pageSelect');
    const counter = document.getElementById('counter');
    let currentIndex = 0;

    // Generovanie obsahu
    for (let i = 1; i <= totalImages; i++) {
        let fileName = i < 10 ? `0${i}` : i;
        
        // Obrázok
        let img = document.createElement('img');
        img.src = `img/${fileName}.jpg`;
        img.alt = `Zastavenie ${i}`;
        slidesContainer.appendChild(img);

        // Možnosť v selecte
        let option = document.createElement('option');
        option.value = i - 1;
        option.text = `Zastavenie ${i}`;
        select.appendChild(option);
    }

    function updateSlider() {
        // Posun o 100% šírky kontajnera
        slidesContainer.style.transform = `translateX(${-currentIndex * 100}%)`;
        select.value = currentIndex;
        counter.innerText = `Zastavenie ${currentIndex + 1} / ${totalImages}`;
        
        // Scroll na vrch stránky pri prepnutí (voliteľné, užitočné na mobile)
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function moveSlide(direction) {
        currentIndex += direction;
        if (currentIndex >= totalImages) currentIndex = 0;
        if (currentIndex < 0) currentIndex = totalImages - 1;
        updateSlider();
    }

    function goToSlide(index) {
        currentIndex = parseInt(index);
        updateSlider();
    }

    // Podpora šípok na klávesnici
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") moveSlide(-1);
        if (e.key === "ArrowRight") moveSlide(1);
    });
</script>

</body>
</html>
