<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krížová cesta 2026, Rajecké Teplice</title>
    <link rel="icon" href="img/icon.jpg" type="img/jpg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        
        html, body {
            background-color: #f4f4f4;
            min-height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        body.modal-open { overflow: hidden !important; height: 100vh; }

        .main-title {
            text-align: center; color: #2c3e50; margin: 20px 0 10px 0;
            font-size: 1.6rem; line-height: 1.2; font-weight: bold;
        }

        .top-nav { margin-bottom: 15px; width: 100%; max-width: 900px; display: flex; justify-content: center; gap: 10px; }
        .mode-btn { 
            background: #ccc; color: #333; border: none; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.3s;
        }
        .mode-btn.active { color: white; }
        #btn-noty.active { background: #8e44ad; }
        #btn-texty.active { background: #27ae60; }

        #zoom-controls { margin-bottom: 15px; display: none; gap: 10px; }
        #zoom-controls.visible { display: flex; }
        .zoom-btn { background: #ddd; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .slider-wrapper { 
            width: 100%; max-width: 900px; background: white; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 5px; overflow: hidden;
        }

        #noty-section { position: relative; overflow: hidden; width: 100%; }
        .slides { display: flex; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); align-items: center; }
        .slides img { width: 100%; height: auto; max-height: 70vh; object-fit: contain; flex-shrink: 0; display: block; cursor: zoom-in; }

        #texty-section { width: 100%; min-height: 200px; padding: 25px; display: none; align-items: center; justify-content: center; }
        .text-display { width: 100%; text-align: center; font-size: 1.3rem; line-height: 1.5; color: #333; }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            overflow: auto;
        }

        #lightbox-container {
            position: relative;
            min-height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #lightbox-img {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            will-change: transform;
            cursor: grab;
        }

        /* OPRAVENÝ KRÍŽIK - Fixný a vycentrovaný */
        #global-close-btn {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: #e74c3c; /* Jasná červená pre dobrú viditeľnosť */
            color: white;
            font-size: 30px;
            font-weight: bold;
            border-radius: 50%;
            z-index: 9999;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            
            /* Perfektné vycentrovanie X */
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0; 
            padding-bottom: 4px; /* Jemná korekcia pre vizuálne centrum */
        }

        .navigation-bar { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 900px; }
        .nav-controls { display: flex; justify-content: space-between; width: 100%; gap: 10px; }
        .nav-btn { background: #4a4a4a; color: white; border: none; padding: 12px; font-size: 1rem; cursor: pointer; border-radius: 8px; flex: 1; }
        
        .controls-center { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }
        select { width: 100%; max-width: 250px; padding: 12px; font-size: 1rem; border-radius: 8px; }
        .counter { font-size: 0.85rem; color: #666; font-weight: bold; }

        @media (max-width: 1024px) {
            #lightbox-img { transition: none; }
            #global-close-btn { width: 45px; height: 45px; font-size: 28px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

<div id="global-close-btn" onclick="closeLightbox()">&#10005;</div>

<h1 class="main-title">Krížová cesta 2026<br>Rajecké Teplice</h1>

<div class="top-nav">
    <button id="btn-noty" class="mode-btn active" onclick="setMode('noty')">NOTY</button>
    <button id="btn-texty" class="mode-btn" onclick="setMode('texty')">TEXTY</button>
</div>

<div id="zoom-controls">
    <button class="zoom-btn" onclick="changeZoom(-2)">A-</button>
    <button class="zoom-btn" onclick="resetZoom()">Pôvodná</button>
    <button class="zoom-btn" onclick="changeZoom(2)">A+</button>
</div>

<div class="slider-wrapper">
    <div id="noty-section">
        <div class="slides" id="slides-img"></div>
    </div>
    <div id="texty-section">
        <div id="text-display" class="text-display"></div>
    </div>
</div>

<div class="navigation-bar">
    <div class="nav-controls">
        <button class="nav-btn" onclick="moveSlide(-1)">&#10094; Späť</button>
        <button class="nav-btn" onclick="moveSlide(1)">Ďalej &#10095;</button>
    </div>
    <div class="controls-center">
        <div class="counter" id="counter">Úvod</div>
        <select id="pageSelect" onchange="goToSlide(this.value)"></select>
    </div>
</div>

<div id="lightbox" onclick="handleBgClick(event)">
    <div id="lightbox-container">
        <img id="lightbox-img" src="" alt="Noty" onclick="event.stopPropagation()">
    </div>
</div>

<script>
    const totalSlides = 16;
    let currentIndex = 0;
    let currentFontSize = 22;

    const texts = [
        "<b>Úvodná pieseň:</b><br>Ú1: Per crucem tuam adoramus Te, o Christe. Crucem tuam adoramus te, o Christe. <br><br><b>Ú2:</b> A. Zostaňte a bdejte so mnou, bdejte a proste, bdejte a proste.",
        "<b>1. zastavenie:</b><br>Ježiš je odsúdený na smrť.",
        "<b>2. zastavenie:</b><br>Ježiš berie kríž na svoje plecia.",
        "<b>3. zastavenie:</b><br>Ježiš padá prvý raz pod krížom.",
        "<b>4. zastavenie:</b><br>Ježiš sa stretá so svojou Matkou.",
        "<b>5. zastavenie:</b><br>Šimon Cyrenajský pomáha Ježišovi niesť kríž.",
        "<b>6. zastavenie:</b><br>Veronika podáva Ježišovi šatku.",
        "<b>7. zastavenie:</b><br>Ježiš padá druhý raz pod krížom.",
        "<b>8. zastavenie:</b><br>Ježiš napomína plačúce ženy.",
        "<b>9. zastavenie:</b><br>Ježiš padá tretí raz pod krížom.",
        "10. zastavenie:<br>Ježišovi vyzliekajú šaty.",
        "11. zastavenie:<br>Ježiša pribíjajú na kríž.",
        "12. zastavenie:<br>Ježiš na kríži zomiera.",
        "13. zastavenie:<br>Ježiša snímajú z kríža.",
        "14. zastavenie:<br>Ježiša pochovávajú.",
        "Záverečná pieseň:<br>Kristus víťaz, Kristus kráľ!"
    ];

    function getSlideName(index) {
        if (index === 0) return "Úvod";
        if (index === 15) return "Záver";
        return `Zastavenie ${index}`;
    }

    const slidesImgContainer = document.getElementById('slides-img');
    const select = document.getElementById('pageSelect');

    for (let i = 0; i < totalSlides; i++) {
        let fileName = (i + 1) < 10 ? `0${i + 1}` : (i + 1);
        let img = document.createElement('img');
        img.src = `img/${fileName}.jpg`;
        img.onclick = function() { openLightbox(this.src); };
        slidesImgContainer.appendChild(img);

        let option = document.createElement('option');
        option.value = i;
        option.text = getSlideName(i);
        select.appendChild(option);
    }

    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const closeBtn = document.getElementById('global-close-btn');
    let scale = 1, offsetX = 0, offsetY = 0, isDragging = false, startX, startY;

    function openLightbox(src) {
        scale = 1; offsetX = 0; offsetY = 0;
        lbImg.src = src;
        lb.style.display = 'block';
        closeBtn.style.display = 'flex';
        document.body.classList.add('modal-open');
        updateTransform();
        
        // Upravený viewport pre mobil aby krížik menej "skákal"
        document.getElementById('viewport').content = "width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes";
    }

    function closeLightbox() {
        lb.style.display = 'none';
        closeBtn.style.display = 'none';
        document.body.classList.remove('modal-open');
        const vp = document.getElementById('viewport');
        vp.content = "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no";
        setTimeout(() => { vp.content = "width=device-width, initial-scale=1.0"; }, 300);
    }

    function handleBgClick(e) {
        if (e.target.id === 'lightbox' || e.target.id === 'lightbox-container') closeLightbox();
    }

    function updateTransform() {
        if (window.innerWidth > 1024) {
            lbImg.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        } else {
            lbImg.style.transform = `none`;
        }
    }

    lb.addEventListener('wheel', (e) => {
        if (window.innerWidth <= 1024) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.85 : 1.15;
        scale = Math.min(Math.max(1, scale * delta), 6);
        if (scale === 1) { offsetX = 0; offsetY = 0; }
        updateTransform();
    }, { passive: false });

    lbImg.addEventListener('mousedown', (e) => {
        if (window.innerWidth > 1024 && scale > 1) {
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
            lbImg.style.cursor = 'grabbing';
            e.preventDefault();
        }
    });
    window.addEventListener('mousemove', (e) => { if (isDragging) { offsetX = e.clientX - startX; offsetY = e.clientY - startY; updateTransform(); } });
    window.addEventListener('mouseup', () => { isDragging = false; lbImg.style.cursor = 'grab'; });

    function setMode(mode) {
        document.getElementById('btn-noty').classList.toggle('active', mode === 'noty');
        document.getElementById('btn-texty').classList.toggle('active', mode === 'texty');
        document.getElementById('noty-section').style.display = mode === 'noty' ? 'block' : 'none';
        document.getElementById('texty-section').style.display = mode === 'texty' ? 'flex' : 'none';
        document.getElementById('zoom-controls').classList.toggle('visible', mode === 'texty');
        updateDisplay();
    }

    function updateDisplay() {
        slidesImgContainer.style.transform = `translateX(${-currentIndex * 100}%)`;
        // innerHTML pre formátovanie piesní
        document.getElementById('text-display').innerHTML = texts[currentIndex];
        select.value = currentIndex;
        document.getElementById('counter').innerText = getSlideName(currentIndex);
    }

    function moveSlide(direction) {
        currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
        updateDisplay();
    }

    function goToSlide(index) {
        currentIndex = parseInt(index);
        updateDisplay();
    }

    function changeZoom(amount) {
        currentFontSize += amount;
        document.getElementById('text-display').style.fontSize = currentFontSize + "px";
    }
    function resetZoom() {
        currentFontSize = 22;
        document.getElementById('text-display').style.fontSize = currentFontSize + "px";
    }

    updateDisplay();
</script>
</body>
</html>
