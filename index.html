<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responzívny Slider 1-20</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #ececec; padding: 20px; }

        .slider-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            background: #000;
        }

        .slides {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.45, 0, 0.55, 1);
        }

        /* Štýl pre obrázky - prispôsobené na rovnakú výšku */
        .slides img {
            width: 100%;
            aspect-ratio: 16 / 9; /* Pomer strán, môžeš zmeniť podľa potreby */
            object-fit: contain; /* 'cover' ak chceš orezať, 'contain' ak chceš vidieť celý obrázok */
            flex-shrink: 0;
            background: #1a1a1a;
        }

        .btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 24px;
            border-radius: 5px;
            transition: 0.3s;
            user-select: none;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.4); }
        .prev { left: 10px; }
        .next { right: 10px; }

        .controls {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            outline: none;
        }
        
        .counter { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="slider-container">
    <div class="slides" id="slides">
        </div>

    <button class="btn prev" onclick="moveSlide(-1)">&#10094;</button>
    <button class="btn next" onclick="moveSlide(1)">&#10095;</button>
</div>

<div class="controls">
    <div class="counter" id="counter">Obrázok 1 / 20</div>
    <select id="pageSelect" onchange="goToSlide(this.value)">
        </select>
</div>

<script>
    const totalImages = 20;
    const slidesContainer = document.getElementById('slides');
    const select = document.getElementById('pageSelect');
    const counter = document.getElementById('counter');
    let currentIndex = 0;

    // 1. Automatické vygenerovanie obrázkov a možností v selecte
    for (let i = 1; i <= totalImages; i++) {
        // Formátovanie čísla na 01, 02...
        let fileName = i < 10 ? `0${i}` : i;
        
        // Pridanie obrázka
        let img = document.createElement('img');
        img.src = `img/${fileName}.jpg`;
        img.alt = `Obrázok ${fileName}`;
        slidesContainer.appendChild(img);

        // Pridanie možnosti do selectu
        let option = document.createElement('option');
        option.value = i - 1;
        option.text = `Prejsť na ${i}`;
        select.appendChild(option);
    }

    // 2. Funkcia na aktualizáciu zobrazenia
    function updateSlider() {
        slidesContainer.style.transform = `translateX(${-currentIndex * 100}%)`;
        select.value = currentIndex;
        counter.innerText = `Obrázok ${currentIndex + 1} / ${totalImages}`;
    }

    // 3. Ovládanie šípkami
    function moveSlide(direction) {
        currentIndex += direction;
        if (currentIndex >= totalImages) currentIndex = 0;
        if (currentIndex < 0) currentIndex = totalImages - 1;
        updateSlider();
    }

    // 4. Ovládanie cez select
    function goToSlide(index) {
        currentIndex = parseInt(index);
        updateSlider();
    }

    // Podpora pre klávesnicu (šípky vľavo/vpravo)
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") moveSlide(-1);
        if (e.key === "ArrowRight") moveSlide(1);
    });
</script>

</body>
</html>
