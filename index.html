<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krížová cesta 2026, Rajecké Teplice</title>
    <link rel="icon" href="img/icon.jpg" type="img/jpg">
    <style>
        /* RESET A ZÁKLAD */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #f4f4f4; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            min-height: 100vh;
            line-height: 1.5;
        }

        .main-title {
            text-align: center; color: #2c3e50; margin: 20px 0;
            font-size: 1.6rem; font-weight: bold;
        }

        /* PREPÍNAČE */
        .top-nav { margin-bottom: 15px; display: flex; gap: 10px; }
        .mode-btn { 
            background: #ccc; border: none; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; cursor: pointer;
        }
        .mode-btn.active { color: white; }
        #btn-noty.active { background: #8e44ad; }
        #btn-texty.active { background: #27ae60; }

        /* KONTAJNER */
        .slider-wrapper { 
            width: 100%; max-width: 800px; background: white; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            overflow: hidden; padding: 5px;
        }

        #noty-section { width: 100%; overflow: hidden; }
        .slides { display: flex; transition: transform 0.4s ease-out; }
        .slides img { width: 100%; height: auto; display: block; cursor: zoom-in; }

        #texty-section { 
            display: none; padding: 30px; text-align: center; 
            font-size: 1.3rem; white-space: pre-line; 
        }

        /* LIGHTBOX - MODERNY PRISTUP */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            touch-action: none; /* JavaScript prevezme kontrolu nad gestami */
        }

        #lightbox img {
            max-width: 100%;
            max-height: 100%;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        #close-lightbox {
            position: absolute; top: 20px; right: 25px;
            color: white; font-size: 40px; cursor: pointer; z-index: 10000;
        }

        /* OVLÁDANIE */
        .navigation-bar { margin-top: 20px; width: 100%; max-width: 800px; text-align: center; }
        .nav-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .nav-btn { 
            flex: 1; padding: 15px; background: #4a4a4a; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;
        }
        
        select { padding: 10px; width: 100%; max-width: 250px; border-radius: 8px; }
        .counter { margin-bottom: 5px; font-weight: bold; color: #666; font-size: 0.9rem; }

        .hidden { display: none !important; }
        .show { display: block !important; }
    </style>
</head>
<body>

<h1 class="main-title">Krížová cesta 2026<br>Rajecké Teplice</h1>

<div class="top-nav">
    <button id="btn-noty" class="mode-btn active" onclick="setMode('noty')">NOTY</button>
    <button id="btn-texty" class="mode-btn" onclick="setMode('texty')">TEXTY</button>
</div>

<div class="slider-wrapper">
    <div id="noty-section">
        <div class="slides" id="slides-img"></div>
    </div>
    <div id="texty-section"></div>
</div>

<div class="navigation-bar">
    <div class="nav-controls">
        <button class="nav-btn" onclick="moveSlide(-1)">&#10094; Späť</button>
        <button class="nav-btn" onclick="moveSlide(1)">Ďalej &#10095;</button>
    </div>
    <div class="counter" id="counter">Úvod</div>
    <select id="pageSelect" onchange="goToSlide(this.value)"></select>
</div>

<div id="lightbox" onclick="closeLightbox()">
    <span id="close-lightbox">&times;</span>
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
    const totalSlides = 16;
    let currentIndex = 0;
    const texts = [
        "Úvodná pieseň...", "1. zastavenie...", "2. zastavenie...", "3. zastavenie...", 
        "4. zastavenie...", "5. zastavenie...", "6. zastavenie...", "7. zastavenie...", 
        "8. zastavenie...", "9. zastavenie...", "10. zastavenie...", "11. zastavenie...", 
        "12. zastavenie...", "13. zastavenie...", "14. zastavenie...", "Záverečná pieseň..."
    ];

    // INICIALIZÁCIA
    const slidesImgContainer = document.getElementById('slides-img');
    const select = document.getElementById('pageSelect');

    for (let i = 0; i < totalSlides; i++) {
        const img = document.createElement('img');
        img.src = `img/${String(i + 1).padStart(2, '0')}.jpg`;
        img.onclick = () => openLightbox(img.src);
        slidesImgContainer.appendChild(img);

        const opt = document.createElement('option');
        opt.value = i;
        opt.text = i === 0 ? "Úvod" : i === 15 ? "Záver" : `Zastavenie ${i}`;
        select.appendChild(opt);
    }

    // LIGHTBOX LOGIKA (ZOOM A DRAG)
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    let scale = 1, lastScale = 1, startDist = 0;

    function openLightbox(src) {
        lbImg.src = src;
        scale = 1;
        lbImg.style.transform = `scale(${scale})`;
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Iba dočasne vypne scroll pozadia
    }

    function closeLightbox() {
        lb.style.display = 'none';
        document.body.style.overflow = '';
    }

    // PINCH TO ZOOM PRE MOBIL (NATIVE-LIKE)
    lb.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            lastScale = scale;
        }
    });

    lb.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            scale = Math.min(Math.max(1, lastScale * (dist / startDist)), 4);
            lbImg.style.transform = `scale(${scale})`;
        }
    });

    // MOUSE WHEEL ZOOM (PC)
    lb.addEventListener('wheel', e => {
        e.preventDefault();
        scale += e.deltaY * -0.005;
        scale = Math.min(Math.max(1, scale), 4);
        lbImg.style.transform = `scale(${scale})`;
    }, { passive: false });

    // KLASICKÉ FUNKCIE
    function setMode(mode) {
        document.getElementById('btn-noty').classList.toggle('active', mode === 'noty');
        document.getElementById('btn-texty').classList.toggle('active', mode === 'texty');
        document.getElementById('noty-section').style.display = mode === 'noty' ? 'block' : 'none';
        document.getElementById('texty-section').style.display = mode === 'texty' ? 'block' : 'none';
        updateDisplay();
    }

    function updateDisplay() {
        slidesImgContainer.style.transform = `translateX(-${currentIndex * 100}%)`;
        document.getElementById('texty-section').innerText = texts[currentIndex];
        document.getElementById('counter').innerText = currentIndex === 0 ? "Úvod" : currentIndex === 15 ? "Záver" : `Zastavenie ${currentIndex}`;
        select.value = currentIndex;
    }

    function moveSlide(n) {
        currentIndex = (currentIndex + n + totalSlides) % totalSlides;
        updateDisplay();
    }

    function goToSlide(n) {
        currentIndex = parseInt(n);
        updateDisplay();
    }

    updateDisplay();
</script>
</body>
</html>
