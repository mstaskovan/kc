<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krížová cesta 2026, Rajecké Teplice</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 100vh; }

        .main-title {
            text-align: center;
            color: #2c3e50;
            margin: 20px 0 10px 0; /* Jednotné medzery: hore 20px, dole 10px */
            font-size: 1.6rem;      /* Rovnaká veľkosť písma */
            line-height: 1.2;
            font-weight: bold;
        }

        /* Prepínač nad sliderom */
        .top-nav { margin-bottom: 10px; width: 100%; max-width: 800px; display: flex; justify-content: center; }
        .toggle-btn { 
            background: #27ae60; color: white; text-decoration: none; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .zoom-controls { margin-bottom: 15px; display: flex; gap: 10px; }
        .zoom-btn { background: #ddd; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .slider-wrapper {
            width: 100%; max-width: 800px; background: white; min-height: 350px;
            padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        .text-content { width: 100%; text-align: center; font-size: 1.3rem; line-height: 1.5; white-space: pre-line; color: #333; transition: opacity 0.3s ease; }

        /* Navigácia pod sliderom */
        .navigation-bar { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 800px; }
        .nav-controls { display: flex; justify-content: space-between; width: 100%; gap: 10px; }
        
        .nav-btn { background: #4a4a4a; color: white; border: none; padding: 12px; font-size: 1rem; cursor: pointer; border-radius: 8px; flex: 1; text-align: center; }

        .controls-center { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }
        select { width: 100%; max-width: 250px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: white; font-size: 1rem; }
        .counter { font-size: 0.85rem; color: #666; font-weight: bold; text-transform: uppercase; }

        @media (max-width: 480px) {
            .main-title {font-size: 1.3rem; margin: 15px 0 10px 0; }
            .text-content { font-size: 1.1rem; }
            .nav-btn { padding: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<h1 class="main-title">Krížová cesta 2026 <br> Rajecké Teplice</h1>

<div class="top-nav">
    <a href="index.html" class="toggle-btn">Prepnúť na NOTY</a>
</div>

<div class="zoom-controls">
    <button class="zoom-btn" onclick="changeZoom(-2)">A-</button>
    <button class="zoom-btn" onclick="resetZoom()">Pôvodná</button>
    <button class="zoom-btn" onclick="changeZoom(2)">A+</button>
</div>

<div class="slider-wrapper">
    <div id="textContent" class="text-content"></div>
</div>

<div class="navigation-bar">
    <div class="nav-controls">
        <button class="nav-btn" onclick="moveSlide(-1)">&#10094; Predchádzajúca</button>
        <button class="nav-btn" onclick="moveSlide(1)">Nasledujúca &#10095;</button>
    </div>
    
    <div class="controls-center">
        <div class="counter" id="counter">Úvod</div>
        <select id="pageSelect" onchange="goToSlide(this.value)"></select>
    </div>
</div>

<script>
    const texts = [
        "Úvodná pieseň:\nAdoramus te Christe benedicimus tibi, quia per crucem tuam redemisti mundum, quia per crucem tuam redemisti mundum.",
        "1. zastavenie:\nJežiš je odsúdený na smrť.",
        "2. zastavenie:\nJežiš berie kríž na svoje plecia.",
        "3. zastavenie:\nJežiš padá prvý raz pod krížom.",
        "4. zastavenie:\nJežiš sa stretá so svojou Matkou.",
        "5. zastavenie:\nŠimon Cyrenajský pomáha Ježišovi niesť kríž.",
        "6. zastavenie:\nVeronika podáva Ježišovi šatku.",
        "7. zastavenie:\nJežiš padá druhý raz pod krížom.",
        "8. zastavenie:\nJežiš napomína plačúce ženy.",
        "9. zastavenie:\nJežiš padá tretí raz pod krížom.",
        "10. zastavenie:\nJežišovi vyzliekajú šaty.",
        "11. zastavenie:\nJežiša pribíjajú na kríž.",
        "12. zastavenie:\nJežiš na kríži zomiera.",
        "13. zastavenie:\nJežiša snímajú z kríža.",
        "14. zastavenie:\nJežiša pochovávajú.",
        "Záverečná pieseň:\nKristus víťaz, Kristus kráľ!"
    ];

    let currentIndex = 0;
    let currentFontSize = 22;

    const textElement = document.getElementById('textContent');
    const select = document.getElementById('pageSelect');
    const counter = document.getElementById('counter');

    function init() {
        texts.forEach((_, i) => {
            let opt = document.createElement('option');
            opt.value = i;
            opt.text = i === 0 ? "Úvod" : (i === 15 ? "Záver" : `Zastavenie ${i}`);
            select.appendChild(opt);
        });
        updateDisplay();
    }

    function updateDisplay() {
        textElement.style.opacity = 0;
        setTimeout(() => {
            textElement.innerText = texts[currentIndex];
            textElement.style.opacity = 1;
            select.value = currentIndex;
            counter.innerText = currentIndex === 0 ? "Úvod" : (currentIndex === 15 ? "Záver" : `Zastavenie ${currentIndex}`);
        }, 200);
    }

    function moveSlide(dir) {
        currentIndex += dir;
        if (currentIndex >= texts.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = texts.length - 1;
        updateDisplay();
    }

    function goToSlide(val) {
        currentIndex = parseInt(val);
        updateDisplay();
    }

    function changeZoom(amount) {
        currentFontSize += amount;
        textElement.style.fontSize = currentFontSize + "px";
    }

    function resetZoom() {
        currentFontSize = 22;
        textElement.style.fontSize = currentFontSize + "px";
    }

    init();
</script>
</body>
</html>
